name: Daily Morning Brief

on:
  schedule:
    # 5:30 AM Gulf Standard Time = 01:30 UTC, every day
    - cron: "30 1 * * *"
  workflow_dispatch:  # manual trigger button in the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg (needed by pydub)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Configure git author
        run: |
          git config user.name "morning-brief-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Run the daily pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python src/run_daily.py
